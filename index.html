// COMPONENTE: TOAST
// ════════════════════════════════════════════════════════════════════════════
function Toast({ message, onDone }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onDone, 2400);
    return () => clearTimeout(t);
  }, [message, onDone]);
  return message ? <div className="toast" role="status" aria-live="polite">{message}</div> : null;
}

// ════════════════════════════════════════════════════════════════════════════
// COMPONENTE: SIDEBAR ORIGINALE
// ════════════════════════════════════════════════════════════════════════════
function OriginalSidebar({ project }) {
  if (!project.originalText || !project.originalText.trim()) return null;

  // Calcola coverage delle parole
  const allWords = useMemo(() => {
    const set = new Set();
    project.nuclei.forEach(n => n.tiles.forEach(t => {
      const w = (t.word || '').toLowerCase().trim();
      if (w) set.add(w);
    }));
    return set;
  }, [project.nuclei]);

  // Highlight delle parole "coperte" nel testo originale
  const segments = useMemo(() => {
    const text = project.originalText;
    const tokens = text.split(/(\s+|[.,;:!?])/);
    return tokens.map((tok, i) => {
      const clean = tok.toLowerCase().replace(/[.,;:!?]/g,'').trim();
      if (!clean) return { text: tok, covered: false };
      // Cerca match parziale nelle parole CAA
      let covered = false;
      for (const w of allWords) {
        if (w.includes(clean) || clean.includes(w)) {
          if (clean.length >= 3 || w.length >= 3) { covered = true; break; }
        }
      }
      return { text: tok, covered };
    });
  }, [project.originalText, allWords]);

  const coveredCount = segments.filter(s => s.covered).length;
  const totalWords = segments.filter(s => s.text.trim() && !/^[.,;:!?]$/.test(s.text)).length;

  return (
    <div className="original-sidebar">
      <div className="sidebar-title">Testo originale</div>
      <div className="sidebar-text">
        {segments.map((seg, i) =>
          seg.covered
            ? <mark key={i} className="covered">{seg.text}</mark>
            : <span key={i}>{seg.text}</span>
        )}
      </div>
      <div className="sidebar-stats">
        {coveredCount} di {totalWords} parole tradotte (approssimativo)
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// COMPONENTE: APP PRINCIPALE
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [projects, setProjects] = useState([]);
  const [currentId, setCurrentId] = useState(null);
  const [view, setView] = useState('editor');
  const [toast, setToast] = useState('');
  const [exporting, setExporting] = useState(false);
  const [showModeChoice, setShowModeChoice] = useState(false);
  const [checks, setChecks] = useState([]);
  const fileInputRef = useRef(null);
  const initialized = useRef(false);

  // Caricamento iniziale
  useEffect(() => {
    if (initialized.current) return;
    initialized.current = true;
    const data = loadFromStorage();
    if (data?.projects?.length > 0) {
      setProjects(data.projects);
      setCurrentId(data.currentId || data.projects[0].id);
    } else {
      const example = exampleProject();
      setProjects([example]);
      setCurrentId(example.id);
    }
  }, []);

  // Salvataggio automatico
  useEffect(() => {
    if (!initialized.current || projects.length === 0) return;
    saveToStorage({ projects, currentId });
  }, [projects, currentId]);

  const currentProject = projects.find(p => p.id === currentId);
  const warnings = useMemo(() => validateProject(currentProject), [currentProject]);

  // ── Operazioni progetto ────────────────────────
  const updateProject = (updated) => {
    setProjects(prev => prev.map(p => p.id === updated.id ? {...updated, updatedAt: new Date().toISOString()} : p));
  };

  const updateTitle = (title) => currentProject && updateProject({...currentProject, title});

  const startNewProject = () => setShowModeChoice(true);

  const createProject = (mode) => {
    const p = emptyProject('Nuova traduzione CAA', mode);
    setProjects(prev => [p, ...prev]);
    setCurrentId(p.id);
    setView('editor');
    setShowModeChoice(false);
    setToast(mode === 'guidata' ? 'Modalità guidata avviata: parti dal Passo 1.' : 'Nuovo progetto in modalità libera.');
  };

  const duplicateProject = (id) => {
    const orig = projects.find(p => p.id === id);
    if (!orig) return;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = uid();
    copy.title = orig.title + ' (copia)';
    copy.createdAt = new Date().toISOString();
    copy.updatedAt = new Date().toISOString();
    copy.nuclei = copy.nuclei.map(n => ({
      ...n, id: uid(),
      tiles: n.tiles.map(t => ({...t, id: uid()}))
    }));
    setProjects(prev => [copy, ...prev]);
    setCurrentId(copy.id);
    setToast('Traduzione duplicata.');
  };

  const deleteProject = (id) => {
    if (!confirm('Vuoi eliminare definitivamente questa traduzione? L\'azione non è reversibile.')) return;
    const remaining = projects.filter(p => p.id !== id);
    setProjects(remaining);
    if (currentId === id) setCurrentId(remaining[0]?.id || null);
    setToast('Traduzione eliminata.');
  };

  // ── Operazioni nuclei ──────────────────────────
  const updateNucleus = (updated) => {
    if (!currentProject) return;
    if (updated._moveDir) {
      const nuclei = [...currentProject.nuclei];
      const idx = nuclei.findIndex(n => n.id === updated.id);
      if (idx === -1) return;
      const newIdx = updated._moveDir === 'up' ? idx - 1 : idx + 1;
      if (newIdx < 0 || newIdx >= nuclei.length) return;
      [nuclei[idx], nuclei[newIdx]] = [nuclei[newIdx], nuclei[idx]];
      updateProject({...currentProject, nuclei});
      return;
    }
    updateProject({
      ...currentProject,
      nuclei: currentProject.nuclei.map(n => n.id === updated.id ? updated : n)
    });
  };

  const addNucleus = () => {
    if (!currentProject) return;
    const newNuc = { id: uid(), title: `Nucleo ${currentProject.nuclei.length + 1}`, tiles: [] };
    updateProject({ ...currentProject, nuclei: [...currentProject.nuclei, newNuc] });
  };

  const deleteNucleus = (id) => {
    if (!currentProject) return;
    if (currentProject.nuclei.length <= 1) {
      setToast('Devi mantenere almeno un nucleo.');
      return;
    }
    updateProject({ ...currentProject, nuclei: currentProject.nuclei.filter(n => n.id !== id) });
  };

  // ── Stepper guidato ────────────────────────────
  const setStep = (step) => {
    if (!currentProject) return;
    const completed = currentProject.completedSteps || [];
    const newCompleted = currentProject.currentStep && !completed.includes(currentProject.currentStep)
      ? [...completed, currentProject.currentStep]
      : completed;
    updateProject({...currentProject, currentStep: step, completedSteps: newCompleted});
  };

  // ── Esportazione ───────────────────────────────
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ projects, schemaVersion: SCHEMA_VERSION }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `atelier-caa-archivio-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setToast('Archivio esportato.');
  };

  const exportCurrentJSON = () => {
    if (!currentProject) return;
    const blob = new Blob([JSON.stringify({ projects: [currentProject], schemaVersion: SCHEMA_VERSION }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentProject.title.replace(/[^a-z0-9]/gi, '_')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setToast('Traduzione esportata.');
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.projects || !Array.isArray(data.projects)) throw new Error('Formato non valido');
        const imported = data.projects.map(p => ({
          ...p,
          id: uid(),
          mode: p.mode || 'libera',
          completedSteps: p.completedSteps || [],
          currentStep: p.currentStep || 1,
          step1Analysis: p.step1Analysis || { passive: false, subordinate: false, hiddenSubject: false, ambiguousPronoun: false, forbiddenTense: false, abstractWord: false, notes: '' },
          step2Nuclei: p.step2Nuclei || [],
          step3Simplified: p.step3Simplified || {},
          step4Lexicon: p.step4Lexicon || [],
          originalText: p.originalText || '',
          nuclei: (p.nuclei || []).map(n => ({
            ...n, id: uid(),
            tiles: (n.tiles || []).map(t => ({...t, id: uid()}))
          }))
        }));
        setProjects(prev => [...imported, ...prev]);
        if (imported[0]) setCurrentId(imported[0].id);
        setToast(`${imported.length} traduzione/i caricata/e.`);
      } catch (err) {
        setToast('File non riconosciuto.');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  const handlePrint = () => {
    setView('preview');
    setTimeout(() => window.print(), 300);
  };

  const handlePdfExport = async () => {
    if (!currentProject) return;
    setView('preview');
    setExporting(true);
    setToast('Generazione PDF in corso…');
    await new Promise(r => setTimeout(r, 500));

    try {
      const element = document.getElementById('preview-content');
      if (!element) throw new Error('Anteprima non disponibile');

      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: '#FFFFFF',
        useCORS: true,
        logging: false,
        windowWidth: Math.max(element.scrollWidth, 800)
      });

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();
      const drawW = pdfWidth - 20;
      const ratio = canvas.width / drawW;
      const drawH = canvas.height / ratio;

      if (drawH <= pdfHeight - 20) {
        const y = (pdfHeight - drawH) / 2;
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, y, drawW, drawH);
      } else {
        const pageHeightPx = (pdfHeight - 20) * ratio;
        let yOffset = 0, pageNum = 0;
        while (yOffset < canvas.height) {
          if (pageNum > 0) pdf.addPage();
          const pageCanvas = document.createElement('canvas');
          pageCanvas.width = canvas.width;
          pageCanvas.height = Math.min(pageHeightPx, canvas.height - yOffset);
          const ctx = pageCanvas.getContext('2d');
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
          ctx.drawImage(canvas, 0, -yOffset);
          pdf.addImage(pageCanvas.toDataURL('image/png'), 'PNG', 10, 10, drawW, (pageCanvas.height / canvas.width) * drawW);
          yOffset += pageHeightPx;
          pageNum++;
        }
      }

      pdf.save(`${currentProject.title.replace(/[^a-z0-9]/gi, '_')}.pdf`);
      setToast('PDF scaricato.');
    } catch (err) {
      console.error(err);
      setToast('Errore PDF — usa "Stampa" come alternativa.');
    } finally {
      setExporting(false);
    }
  };

  const handlePngExport = async () => {
    if (!currentProject) return;
    setView('preview');
    setExporting(true);
    setToast('Generazione immagine in corso…');
    await new Promise(r => setTimeout(r, 500));
    try {
      const element = document.getElementById('preview-content');
      const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#FFFFFF', useCORS: true, logging: false });
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentProject.title.replace(/[^a-z0-9]/gi, '_')}.png`;
        a.click();
        URL.revokeObjectURL(url);
        setToast('Immagine scaricata.');
      });
    } catch (err) {
      setToast('Errore esportazione.');
    } finally {
      setExporting(false);
    }
  };

  // ════════ RENDER MODALE SCELTA ════════
  const ModeChoiceModal = () => (
    <div className="modal-overlay" onClick={() => setShowModeChoice(false)} role="dialog" aria-modal="true">
      <div className="modal-content" onClick={e => e.stopPropagation()} style={{maxWidth: 560}}>
        <div className="modal-header">
          <div className="modal-title">Come vuoi cominciare?</div>
          <button className="btn btn-icon btn-secondary" onClick={() => setShowModeChoice(false)} aria-label="Chiudi">×</button>
        </div>
        <div className="modal-body">
          <div style={{fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 14, color: 'var(--p-ink-light)', marginBottom: 6}}>
            Scegli l'approccio adatto alla tua esperienza con il metodo CAA.
          </div>
          <div className="mode-choice">
            <button className="mode-card" onClick={() => createProject('libera')}>
              <div className="mode-card-icon">∰</div>
              <div className="mode-card-title">Modalità libera</div>
              <div className="mode-card-desc">
                Costruzione diretta della tavola, partendo dalle tessere. Per chi
                conosce già il metodo o vuole adattare un testo già semplificato.
              </div>
            </button>
            <button className="mode-card" onClick={() => createProject('guidata')}>
              <div className="mode-card-icon">∮</div>
              <div className="mode-card-title">Modalità guidata</div>
              <div className="mode-card-desc">
                Percorso a sette passi: dalla comprensione del testo originale alla
                tavola finale. Pensato per l'apprendimento del metodo in classe.
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  // ════════ RENDER STEP CORRENTE (modalità guidata) ════════
  const renderGuidedStep = () => {
    if (!currentProject) return null;
    const step = currentProject.currentStep || 1;
    if (step === 1) return <Step1Comprehension project={currentProject} onUpdate={updateProject} />;
    if (step === 2) return <Step2Nuclei project={currentProject} onUpdate={updateProject} />;
    if (step === 3) return <Step3Simplification project={currentProject} onUpdate={updateProject} />;
    if (step === 4) return <Step4Lexicon project={currentProject} onUpdate={updateProject} />;
    // Steps 5-7 → l'editor di tessere standard, con messaggio guida
    return null;
  };

  const showEditorTiles = !currentProject?.mode || currentProject.mode === 'libera' || (currentProject.currentStep || 1) >= 5;

  // ════════ RENDER MAIN ════════
  return (
    <div>
      <header className="app-header">
        <div className="brand">
          <div className="brand-mark">A</div>
          <div className="brand-text">
            <div className="brand-title">Atelier CAA</div>
            <div className="brand-subtitle">Comunicazione Aumentativa Alternativa</div>
          </div>
        </div>
        <div className="header-actions">
          <button className="btn btn-ghost btn-small" onClick={() => fileInputRef.current?.click()} title="Carica un archivio JSON">
            ↑ Carica
          </button>
          <input ref={fileInputRef} type="file" accept="application/json" onChange={importJSON} style={{display: 'none'}} />
          <button className="btn btn-ghost btn-small" onClick={exportJSON} title="Esporta tutti i progetti come archivio JSON">
            ↓ Archivio
          </button>
        </div>
      </header>

      <nav className="tab-nav" role="tablist">
        <button
          role="tab"
          aria-selected={view === 'projects'}
          className={`tab-btn ${view === 'projects' ? 'active' : ''}`}
          onClick={() => setView('projects')}
        >
          Le tue traduzioni ({projects.length})
        </button>
        <button
          role="tab"
          aria-selected={view === 'editor'}
          className={`tab-btn ${view === 'editor' ? 'active' : ''}`}
          onClick={() => setView('editor')}
          disabled={!currentProject}
        >
          Lavoro in corso
        </button>
        <button
          role="tab"
          aria-selected={view === 'preview'}
          className={`tab-btn ${view === 'preview' ? 'active' : ''}`}
          onClick={() => setView('preview')}
          disabled={!currentProject}
        >
          Anteprima e stampa
        </button>
      </nav>

      <main className="app-main" id="main-content">
        {/* ═══ VISTA PROGETTI ═══ */}
        {view === 'projects' && (
          <div className="panel editor-only">
            <div className="panel-title">
              <span>Le tue traduzioni</span>
              <button className="btn btn-primary" onClick={startNewProject}>+ Nuova traduzione</button>
            </div>
            <div className="panel-subtitle">
              Le traduzioni vengono salvate nel browser. Per portarle altrove, usa Archivio.
            </div>
            {projects.length === 0 ? (
              <div className="empty-state">
                <div className="empty-state-icon">∅</div>
                <div className="empty-state-text">Nessuna traduzione ancora</div>
                <div className="empty-state-hint">Inizia la tua prima traduzione CAA.</div>
                <button className="btn btn-primary btn-large" onClick={startNewProject}>+ Inizia ora</button>
              </div>
            ) : (
              <div className="project-list">
                {projects.map(p => (
                  <div key={p.id} className={`project-card ${p.id === currentId ? 'active' : ''}`} onClick={() => { setCurrentId(p.id); setView('editor'); }} tabIndex={0} role="button"
                    onKeyDown={(e) => {if (e.key === 'Enter') {setCurrentId(p.id); setView('editor');}}}>
                    {p.mode === 'guidata' && <div className="project-card-mode guided">Modalità guidata · passo {p.currentStep || 1}/7</div>}
                    {(!p.mode || p.mode === 'libera') && <div className="project-card-mode">Modalità libera</div>}
                    <div className="project-card-title">{p.title}</div>
                    <div className="project-card-meta">
                      <span>{p.nuclei.length} nucle{p.nuclei.length === 1 ? 'o' : 'i'}</span>
                      <span>{fmtDate(p.updatedAt)}</span>
                    </div>
                    <div className="project-card-actions" onClick={e => e.stopPropagation()}>
                      <button className="btn btn-ghost btn-small" onClick={() => duplicateProject(p.id)} title="Duplica">⎘</button>
                      <button className="btn btn-ghost btn-small" onClick={() => { setCurrentId(p.id); exportCurrentJSON(); }} title="Esporta">↓</button>
                      <button className="btn btn-danger btn-small" onClick={() => deleteProject(p.id)} title="Elimina">×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <div className="help-tip" style={{marginTop: 18}}>
              <strong>Privacy.</strong> Tutto resta nel tuo browser, in locale. Nessun dato viene inviato a server esterni.
              Per evitare di perdere il lavoro, scarica periodicamente un archivio JSON con il pulsante <strong>↓ Archivio</strong>.
            </div>
          </div>
        )}

        {/* ═══ VISTA EDITOR ═══ */}
        {view === 'editor' && currentProject && (
          <>
            {/* Stepper se modalità guidata */}
            {currentProject.mode === 'guidata' && (
              <Stepper
                currentStep={currentProject.currentStep || 1}
                completedSteps={currentProject.completedSteps || []}
                onJump={setStep}
              />
            )}

            {/* Step guidati 1-4 */}
            {currentProject.mode === 'guidata' && (currentProject.currentStep || 1) <= 4 && (
              <>
                {renderGuidedStep()}
                <div className="step-nav">
                  <button
                    className="btn btn-ghost"
                    onClick={() => setStep(Math.max(1, (currentProject.currentStep || 1) - 1))}
                    disabled={(currentProject.currentStep || 1) <= 1}
                  >
                    ← Passo precedente
                  </button>
                  <button
                    className="btn btn-primary"
                    onClick={() => setStep(Math.min(7, (currentProject.currentStep || 1) + 1))}
                  >
                    {(currentProject.currentStep || 1) === 4 ? 'Procedi alla composizione (Passo 5)' : 'Passo successivo →'}
                  </button>
                </div>
              </>
            )}

            {/* Editor tessere (libera, oppure guidata steps 5-7) */}
            {showEditorTiles && (
              <div className={(currentProject.originalText && currentProject.mode === 'guidata') ? 'split-layout with-sidebar' : 'split-layout'}>
                <div>
                  <div className="panel editor-only">
                    <input
                      type="text"
                      className="title-input"
                      value={currentProject.title}
                      onChange={e => updateTitle(e.target.value)}
                      placeholder="Titolo della traduzione CAA"
                      aria-label="Titolo del progetto"
                    />
                    {currentProject.mode === 'guidata' && (currentProject.currentStep || 1) === 5 && (
                      <div className="help-tip">
                        <strong>Passo 5 — Codifica Fitzgerald.</strong> Per ogni parola della frase
                        semplificata, aggiungi una tessera e scegli la <em>categoria grammaticale</em>
                        (colore). Passa con il mouse sopra ogni colore per vederne la spiegazione.
                      </div>
                    )}
                    {currentProject.mode === 'guidata' && (currentProject.currentStep || 1) === 6 && (
                      <div className="help-tip">
                        <strong>Passo 6 — Pittogrammi.</strong> Per ogni tessera, scegli il pittogramma
                        più adatto. Quando un'icona diretta non basta, prova combinazioni di due emoji
                        o usa la <em>modalità testo</em> per nomi di opere e date.
                      </div>
                    )}
                    {currentProject.mode === 'guidata' && (currentProject.currentStep || 1) === 7 && (
                      <SpeechReader project={currentProject} />
                    )}
                    {(!currentProject.mode || currentProject.mode === 'libera') && (
                      <div className="help-tip">
                        Tocca una tessera per modificarla. Il salvataggio è automatico.
                        Passa il mouse sui colori per scoprire le categorie grammaticali.
                      </div>
                    )}

                    {currentProject.nuclei.map(nucleus => (
                      <NucleusBlock
                        key={nucleus.id}
                        nucleus={nucleus}
                        onUpdate={updateNucleus}
                        onDelete={() => deleteNucleus(nucleus.id)}
                        isOnly={currentProject.nuclei.length <= 1}
                        warnings={warnings}
                      />
                    ))}
                    <button className="btn btn-secondary" onClick={addNucleus} style={{marginTop: 8}}>
                      + Aggiungi nucleo di significato
                    </button>
                  </div>

                  {/* Stepper guidato — bottoni navigazione anche per steps 5-7 */}
                  {currentProject.mode === 'guidata' && (
                    <div className="step-nav">
                      <button
                        className="btn btn-ghost"
                        onClick={() => setStep(Math.max(1, (currentProject.currentStep || 1) - 1))}
                      >
                        ← Passo precedente
                      </button>
                      {(currentProject.currentStep || 1) < 7 && (
                        <button
                          className="btn btn-primary"
                          onClick={() => setStep((currentProject.currentStep || 1) + 1)}
                        >
                          Passo successivo →
                        </button>
                      )}
                      {(currentProject.currentStep || 1) === 7 && (
                        <button className="btn btn-success" onClick={() => setView('preview')}>
                          Vai all'anteprima →
                        </button>
                      )}
                    </div>
                  )}

                  {/* Validatore */}
                  <div className="panel editor-only" style={{padding: 16}}>
                    <ValidatorPanel warnings={warnings} />
                  </div>

                  {/* Lettore vocale (sempre disponibile) */}
                  {(!currentProject.mode || currentProject.mode === 'libera' || (currentProject.currentStep || 1) === 7) && currentProject.mode !== 'guidata' && (
                    <div className="panel editor-only" style={{padding: 16}}>
                      <SpeechReader project={currentProject} />
                    </div>
                  )}

                  {/* Esportazione */}
                  <div className="panel editor-only">
                    <div className="panel-title">Esporta la tavola</div>
                    <div className="panel-subtitle">Salva la traduzione finita in vari formati.</div>
                    <div style={{display: 'flex', gap: 8, flexWrap: 'wrap'}}>
                      <button className="btn btn-success" onClick={handlePdfExport} disabled={exporting}>↓ Scarica in PDF</button>
                      <button className="btn btn-success" onClick={handlePngExport} disabled={exporting}>↓ Scarica come immagine</button>
                      <button className="btn btn-secondary" onClick={handlePrint}>⎙ Stampa la tavola</button>
                      <button className="btn btn-ghost" onClick={exportCurrentJSON}>↓ Esporta progetto (JSON)</button>
                    </div>
                  </div>

                  {/* Checklist pre-consegna */}
                  <div className="panel editor-only">
                    <div className="panel-title">Verifica pre-consegna</div>
                    <div className="panel-subtitle">
                      Le sedici voci della <em>Sezione 7</em> della Guida Operativa CAA.
                    </div>
                    <PreSubmitChecklist checks={checks} onChange={setChecks} />
                  </div>
                </div>

                {/* Sidebar testo originale (modalità guidata) */}
                {currentProject.originalText && currentProject.mode === 'guidata' && (
                  <OriginalSidebar project={currentProject} />
                )}
              </div>
            )}
          </>
        )}

        {/* ═══ VISTA ANTEPRIMA ═══ */}
        {view === 'preview' && currentProject && (
          <>
            <div className="panel editor-only" style={{display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center'}}>
              <div style={{flex: 1, fontSize: 13, color: 'var(--p-ink-light)', fontFamily: 'var(--serif)', fontStyle: 'italic', minWidth: 200}}>
                Anteprima fedele della tavola finale. Pronto per stampa, PDF o condivisione.
              </div>
              <button className="btn btn-success" onClick={handlePdfExport} disabled={exporting}>↓ PDF</button>
              <button className="btn btn-success" onClick={handlePngExport} disabled={exporting}>↓ Immagine</button>
              <button className="btn btn-secondary" onClick={handlePrint}>⎙ Stampa</button>
            </div>
            <PreviewView project={currentProject} />
          </>
        )}

        {!currentProject && view !== 'projects' && (
          <div className="panel">
            <div className="empty-state">
              <div className="empty-state-icon">∅</div>
              <div className="empty-state-text">Nessuna traduzione attiva</div>
              <div className="empty-state-hint">Vai a "Le tue traduzioni" per crearne una nuova.</div>
              <button className="btn btn-primary btn-large" onClick={startNewProject} style={{marginTop: 14}}>+ Nuova traduzione</button>
            </div>
          </div>
        )}
      </main>

      {showModeChoice && <ModeChoiceModal />}
      <Toast message={toast} onDone={() => setToast('')} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
